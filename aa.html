<!DOCTYPE html>
<html lang="en">
<head>
    <script src="aa.js"></script>
    <meta charset="UTF-8">
    <title>Page title</title>
    <style>
        .qvg-3d-carousel {
  position: relative;
  width: 500px;
  height: 260px;
  margin: 50px auto;
  transform-style: preserve-3d;
  transform: perspective(1000px);
  animation: qvgRotateStep 15s infinite;
}

/* CARD */
.qvg-3d-carousel-card {
  position: absolute;
  width: 140px;
  height: 200px;
  background: #fff;
  border-radius: 10px;
  border: 1px solid #ddd#8098ff;
  padding: 10px;
  top: 50%;
  left: 50%;
  transform-origin: center;
  transform-style: preserve-3d;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* IMAGE */
.qvg-post-thumbnail img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 6px;
}

/* TEXT */
.qvg-3d-carousel-card h2 {
  font-size: 12px;
  margin: 5px 0;
}

.qvg-blog-date {
  font-size: 10px;
  color: gray;
}

.qvg-3d-carousel-card p {
  font-size: 10px;
  margin: 5px 0;
}

.qvg-3d-carousel-card a {
  font-size: 11px;
  text-decoration: none;
  color: blue;
}

/* POSITIONS (5 cards) */
.qvg-3d-carousel .qvg-3d-carousel-card:nth-child(1) { transform: translate(-50%, -50%) rotateY(0deg)   translateZ(260px); }
.qvg-3d-carousel .qvg-3d-carousel-card:nth-child(2) { transform: translate(-50%, -50%) rotateY(72deg)  translateZ(260px); }
.qvg-3d-carousel .qvg-3d-carousel-card:nth-child(3) { transform: translate(-50%, -50%) rotateY(144deg) translateZ(260px); }
.qvg-3d-carousel .qvg-3d-carousel-card:nth-child(4) { transform: translate(-50%, -50%) rotateY(216deg) translateZ(260px); }
.qvg-3d-carousel .qvg-3d-carousel-card:nth-child(5) { transform: translate(-50%, -50%) rotateY(288deg) translateZ(260px); }

/* STEP ROTATION */
@keyframes qvgRotateStep {
  0%   { transform: perspective(1000px) rotateY(0deg); }
  15%  { transform: perspective(1000px) rotateY(0deg); }

  20%  { transform: perspective(1000px) rotateY(-72deg); }
  35%  { transform: perspective(1000px) rotateY(-72deg); }

  40%  { transform: perspective(1000px) rotateY(-144deg); }
  55%  { transform: perspective(1000px) rotateY(-144deg); }

  60%  { transform: perspective(1000px) rotateY(-216deg); }
  75%  { transform: perspective(1000px) rotateY(-216deg); }

  80%  { transform: perspective(1000px) rotateY(-288deg); }
  95%  { transform: perspective(1000px) rotateY(-288deg); }

  100% { transform: perspective(1000px) rotateY(-360deg); }
}
    </style>
  
</head>
<body bgcolor="#000">
    <div id="qvg-3d-carousel" class="qvg-3d-carousel"></div>
    
</body>
</html>
